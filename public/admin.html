<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leadpost pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#f4f6fb; --ink:#0e1726; --blue:#2b5cff; --line:#e4e8f0; --muted:#6b7688; --card:#fff; --red:#c0392b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--ink); font-family:"Sora",sans-serif; padding:28px 20px; }
  .wrap { max-width:1200px; margin:0 auto; }
  .login { max-width:360px; margin:80px auto 0; text-align:center; }
  .login h1 { font-size:24px; margin-bottom:6px; }
  .login input { width:100%; border:1px solid var(--line); border-radius:10px; padding:13px; margin:16px 0 10px; font-size:15px; }
  button { background:var(--blue); color:#fff; border:none; border-radius:10px; padding:12px 16px; font-weight:600; cursor:pointer; font-family:inherit; font-size:14px; }
  .login button { width:100%; }
  .err { color:var(--red); font-size:13px; min-height:18px; }
  .dash { display:none; }
  .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; flex-wrap:wrap; gap:12px; }
  .topbar h1 { font-size:22px; }
  .topbar .muted { color:var(--muted); font-size:13px; }
  .export { background:#fff; color:var(--blue); border:1px solid var(--blue); }
  .board { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
  @media (max-width:900px){ .board{ grid-template-columns:repeat(2,1fr);} }
  @media (max-width:560px){ .board{ grid-template-columns:1fr;} }
  .col { background:transparent; }
  .col h2 { font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; display:flex; justify-content:space-between; }
  .col .n { color:var(--blue); }
  .lead { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:10px; }
  .lead .nm { font-weight:600; font-size:14px; }
  .lead .em { font-size:12px; color:var(--muted); word-break:break-all; margin:2px 0; }
  .lead .co { font-size:12px; color:var(--ink); }
  .lead .nt { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.4; }
  .lead select { width:100%; margin-top:8px; border:1px solid var(--line); border-radius:7px; padding:5px; font-size:12px; font-family:inherit; }
  .lead .del { font-size:11px; color:var(--red); background:none; border:none; cursor:pointer; padding:4px 0 0; }
  .empty { color:var(--muted); font-size:12px; padding:8px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="login" id="login">
    <h1>Leadpost pipeline</h1>
    <p style="color:var(--muted);font-size:14px">Enter your admin password.</p>
    <input type="password" id="pw" placeholder="Admin password" />
    <button id="loginBtn">Open pipeline</button>
    <div class="err" id="loginErr"></div>
  </div>
  <div class="dash" id="dash">
    <div class="topbar">
      <div><h1>Pipeline</h1><div class="muted" id="count">0 leads</div></div>
      <button class="export" id="exportBtn">Export CSV</button>
    </div>
    <div class="board" id="board"></div>
  </div>
</div>
<script>
  let token="", stages=[];
  const LABELS = { new:"New", contacted:"Contacted", qualified:"Qualified", won:"Won", lost:"Lost" };
  document.getElementById("loginBtn").addEventListener("click", login);
  document.getElementById("pw").addEventListener("keydown", e=>{ if(e.key==="Enter") login(); });
  async function login() {
    const pw=document.getElementById("pw").value, err=document.getElementById("loginErr"); err.textContent="";
    try {
      const res=await fetch("/api/admin/leads",{headers:{Authorization:"Bearer "+pw}});
      if(res.status===401){err.textContent="Wrong password.";return;}
      token=pw; render(await res.json());
      document.getElementById("login").style.display="none";
      document.getElementById("dash").style.display="block";
    } catch { err.textContent="Could not connect."; }
  }
  function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function render(data) {
    stages = data.stages;
    document.getElementById("count").textContent = data.total + " leads";
    const board = document.getElementById("board");
    board.innerHTML = stages.map(st => {
      const items = data.leads.filter(l => l.stage === st);
      const cards = items.length ? items.map(l => `
        <div class="lead">
          <div class="nm">${esc(l.name)}</div>
          <div class="em">${esc(l.email)}</div>
          ${l.company?`<div class="co">${esc(l.company)}</div>`:""}
          ${l.note?`<div class="nt">${esc(l.note)}</div>`:""}
          <select onchange="move(${l.id}, this.value)">
            ${stages.map(s=>`<option value="${s}" ${s===l.stage?"selected":""}>${LABELS[s]||s}</option>`).join("")}
          </select>
          <button class="del" onclick="del(${l.id})">Delete</button>
        </div>`).join("") : '<div class="empty">No leads</div>';
      return `<div class="col"><h2>${LABELS[st]||st} <span class="n">${items.length}</span></h2>${cards}</div>`;
    }).join("");
  }
  async function reload(){ const res=await fetch("/api/admin/leads",{headers:{Authorization:"Bearer "+token}}); render(await res.json()); }
  async function move(id, stage){ await fetch("/api/admin/stage",{method:"POST",headers:{"Content-Type":"application/json",Authorization:"Bearer "+token},body:JSON.stringify({id,stage})}); reload(); }
  async function del(id){ if(!confirm("Delete this lead?"))return; await fetch("/api/admin/delete",{method:"POST",headers:{"Content-Type":"application/json",Authorization:"Bearer "+token},body:JSON.stringify({id})}); reload(); }
  document.getElementById("exportBtn").addEventListener("click", async ()=>{
    const res=await fetch("/api/admin/export",{headers:{Authorization:"Bearer "+token}});
    const blob=await res.blob(), url=URL.createObjectURL(blob), a=document.createElement("a");
    a.href=url; a.download="leads.csv"; a.click(); URL.revokeObjectURL(url);
  });
  window.move=move; window.del=del;
</script>
</body>
</html>
